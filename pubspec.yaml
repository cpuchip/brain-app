name: brain_app
description: "Second Brain — capture thoughts, classify with AI, store to git."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^3.0.2
  shared_preferences: ^2.5.3
  http: ^1.3.0
  flutter_dotenv: ^5.2.1
  intl: ^0.20.2
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5
  flutter_local_notifications: ^19.0.0
  timezone: ^0.10.0
  permission_handler: ^11.4.0
  home_widget: ^0.7.0
  sqflite: ^2.4.2
  connectivity_plus: ^6.1.4
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
